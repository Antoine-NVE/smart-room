services:
  frontend:
    env_file:
      - path: ./frontend/.env.example
        required: true
      - path: ./frontend/.env
        required: false
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      - backend

  backend:
    env_file:
      - path: ./backend/.env.example
        required: true
      - path: ./backend/.env
        required: false
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    depends_on:
      - database

  database:
    image: postgres:18
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-smart-room}
    volumes:
      - database:/var/lib/postgresql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

  pgadmin:
    image: dpage/pgadmin4:9
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@local.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-password}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      - database
    volumes:
      - pgadmin:/var/lib/pgadmin

volumes:
  database:
  pgadmin:
